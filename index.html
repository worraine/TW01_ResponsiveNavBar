<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style1.css">
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">

    <div class="container">

        <a class="navbar-brand me-auto" href="#">Logo</a>

        <div class="offcanvas offcanvas-end"
             tabindex="-1"
             id="offcanvasNavbar"
             aria-labelledby="offcanvasNavbarLabel">

            <div class="offcanvas-header">

                <h5 class="offcanvas-title" id="offcanvasNavbarLabel">
                    Logo
                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="offcanvas"
                        aria-label="Close">
                </button>

            </div>

            <div class="offcanvas-body">

                <a class="navbar-brand d-none d-lg-block me-3" href="#">
                    Logo
                </a>

                <ul class="navbar-nav justify-content-center flex-grow-1 pe-3">

                    <li class="nav-item">
                        <a class="nav-link mx-lg-2 active" href="#">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link mx-lg-2" href="#">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link mx-lg-2" href="#">Services</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link mx-lg-2" href="#">Portfolio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link mx-lg-2" href="#">Contact</a>
                    </li>

                </ul>

            </div>

        </div>

        <a href="#" class="login-button order-lg-2">
            Login
        </a>

        <button class="navbar-toggler border-0 shadow-none order-lg-3"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#offcanvasNavbar"
                aria-controls="offcanvasNavbar"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>

        </button>

    </div>

</nav>

<section class="hero-section">

    <div class="container h-100 d-flex justify-content-center align-items-center text-white flex-column">

        <h1>Responsive Navbar</h1>

    </div>

</section>

<section class="content-section"></section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
